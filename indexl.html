<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HASYTEC — KPI Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.1/lib/msal-browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#001224;--card:#001e38;--cb:#003060;--ch:#002448;
  --text:#e8eef6;--tm:#7a9ab8;--td:#3a5a78;
  --green:#5ab878;--amber:#d4a038;--red:#c8374a;
  --hr:#a32d2d;--hb:#1a4a8a;--bt:#001830;--div:#003060;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;}

/* TOPBAR */
.topbar{background:#001a33;border-bottom:3px solid var(--hr);padding:11px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-brand{display:flex;align-items:center;gap:12px;}
.tb-logo{font-size:17px;font-weight:600;color:#fff;letter-spacing:1px;}
.tb-logo span{color:var(--hr);}
.tb-div{width:1px;height:18px;background:#003060;}
.tb-title{font-size:12px;color:var(--tm);}
.tb-right{display:flex;align-items:center;gap:8px;}
.badge-live{background:#001a0e;color:var(--green);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid #1a4a1a;}
.badge-user{background:var(--card);color:var(--tm);font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--cb);}
.btn-lang{background:var(--card);border:1px solid var(--cb);color:var(--tm);font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:500;}
.btn-lang:hover,.btn-lang.active{background:var(--hb);color:#fff;border-color:var(--hb);}
.btn-logout{background:none;border:1px solid var(--cb);color:var(--tm);font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:inherit;}
.btn-logout:hover{border-color:var(--hr);color:var(--hr);}
.btn-back{background:var(--card);border:1px solid var(--cb);color:var(--tm);font-size:12px;padding:5px 14px;border-radius:6px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
.btn-back:hover{border-color:var(--hb);color:var(--text);}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:20px;}
.login-logo{font-size:36px;font-weight:600;color:#fff;letter-spacing:2px;text-align:center;}
.login-logo span{color:var(--hr);}
.login-sub{font-size:13px;color:var(--tm);text-align:center;}
.login-card{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:28px 36px;text-align:center;width:300px;}
.login-card-title{font-size:15px;font-weight:500;margin-bottom:5px;}
.login-card-sub{font-size:12px;color:var(--tm);margin-bottom:16px;}
.btn-login{background:var(--hb);color:#fff;border:none;font-size:14px;font-weight:500;padding:11px 28px;border-radius:8px;cursor:pointer;font-family:inherit;width:100%;}

/* MAIN PAGE */
.main-wrap{max-width:1160px;margin:0 auto;padding:24px 28px;}
.main-header{margin-bottom:22px;}
.main-title{font-size:20px;font-weight:500;}
.main-sub{font-size:13px;color:var(--tm);margin-top:3px;}
.dept-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.dept-card{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.dept-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.dept-card.score-ok::before{background:var(--green);}
.dept-card.score-warn::before{background:var(--amber);}
.dept-card.score-bad::before{background:var(--red);}
.dept-card.score-live::before{background:var(--hb);}
.dept-card:hover{background:var(--ch);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.dept-icon{font-size:28px;margin-bottom:10px;}
.dept-name{font-size:14px;font-weight:500;margin-bottom:4px;}
.dept-sub{font-size:11px;color:var(--tm);margin-bottom:14px;}
.dept-score-wrap{display:flex;align-items:baseline;gap:4px;margin-bottom:8px;}
.dept-score{font-size:30px;font-weight:300;}
.dept-score.ok{color:var(--green);}
.dept-score.warn{color:var(--amber);}
.dept-score.bad{color:var(--red);}
.dept-score-max{font-size:14px;color:var(--td);}
.dept-bar-track{height:4px;border-radius:2px;background:var(--bt);overflow:hidden;margin-bottom:10px;}
.dept-bar-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.dept-employees{font-size:11px;color:var(--tm);}
.dept-badge-live{position:absolute;top:14px;right:14px;background:#001a0e;color:var(--green);font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid #1a4a1a;}
.dept-badge-demo{position:absolute;top:14px;right:14px;background:#001830;color:var(--tm);font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--cb);}

/* DEPT DETAIL PAGE */
.detail-wrap{max-width:1160px;margin:0 auto;padding:20px 28px;}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.detail-icon{font-size:32px;}
.detail-title{font-size:20px;font-weight:500;}
.detail-sub{font-size:12px;color:var(--tm);margin-top:2px;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.kpi-card{background:var(--card);border:1px solid var(--cb);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--hb);}
.kpi-card.ok::before{background:var(--green);}
.kpi-card.warn::before{background:var(--amber);}
.kpi-card.bad::before{background:var(--red);}
.kpi-lbl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.kpi-val{font-size:26px;font-weight:300;line-height:1.1;}
.kpi-tgt{font-size:11px;margin:8px 0 6px;}
.kpi-tgt.ok{color:var(--green);}
.kpi-tgt.warn{color:var(--amber);}
.kpi-tgt.bad{color:var(--red);}
.bar-t{height:4px;border-radius:2px;background:var(--bt);overflow:hidden;}
.bar-f{height:100%;border-radius:2px;transition:width 0.8s ease;}
.mid-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.card{background:var(--card);border:1px solid var(--cb);border-radius:10px;padding:18px 20px;}
.card-title{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px;}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hbar-row:last-child{margin-bottom:0;}
.hbar-lbl{font-size:11px;color:var(--tm);min-width:72px;text-align:right;}
.hbar-t{flex:1;height:24px;background:var(--bt);border-radius:5px;overflow:hidden;}
.hbar-f{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:500;color:#fff;transition:width 0.7s ease;min-width:24px;}

/* SCORECARD */
.scorecard-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--div);}
.scorecard-row:last-of-type{border-bottom:none;}
.sc-name{flex:1;font-size:12px;}
.sc-w{font-size:11px;color:var(--tm);min-width:76px;text-align:right;margin-right:10px;}
.sc-r{font-size:11px;font-weight:500;min-width:48px;text-align:right;}
.sc-r.ok{color:var(--green);}
.sc-r.warn{color:var(--amber);}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;padding-top:12px;border-top:2px solid var(--hb);}
.total-lbl{font-size:13px;font-weight:500;}
.total-val{font-size:26px;font-weight:300;}
.total-val.ok{color:var(--green);}
.total-val.warn{color:var(--amber);}
.total-max{font-size:14px;color:var(--td);}

/* EMPLOYEE TABLE */
.emp-section{margin-top:14px;}
.emp-title{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
.emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.emp-card{background:var(--card);border:1px solid var(--cb);border-radius:10px;padding:14px 16px;}
.emp-name{font-size:13px;font-weight:500;margin-bottom:3px;}
.emp-role{font-size:11px;color:var(--tm);margin-bottom:10px;}
.emp-kpi-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.emp-kpi-row:last-child{margin-bottom:0;}
.emp-kpi-lbl{font-size:11px;color:var(--tm);}
.emp-kpi-val{font-size:11px;font-weight:500;}
.emp-kpi-val.ok{color:var(--green);}
.emp-kpi-val.warn{color:var(--amber);}
.emp-kpi-val.bad{color:var(--red);}
.emp-score{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--div);}
.emp-score-lbl{font-size:11px;color:var(--tm);}
.emp-score-val{font-size:16px;font-weight:500;}
.emp-score-val.ok{color:var(--green);}
.emp-score-val.warn{color:var(--amber);}
.emp-score-val.bad{color:var(--red);}

/* SCHULUNGEN GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 0;}
.gauge-svg{width:160px;height:88px;}
.gauge-cv{font-size:22px;font-weight:300;text-align:center;margin-top:2px;}
.gauge-cs{font-size:10px;color:var(--tm);text-align:center;}
.sch-row{display:flex;align-items:center;gap:10px;margin-top:10px;justify-content:center;}
.sch-row label{font-size:11px;color:var(--tm);}
.sch-row input[type=range]{-webkit-appearance:none;width:110px;height:4px;background:var(--bt);border-radius:2px;outline:none;}
.sch-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--hb);cursor:pointer;}
.sch-count{font-size:12px;font-weight:500;}
.pc-input-row{display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:center;}
.pc-input-row label{font-size:11px;color:var(--tm);}
.pc-input-row input[type=number]{width:54px;background:var(--bt);border:1px solid var(--cb);border-radius:5px;color:var(--text);font-size:12px;padding:3px 7px;outline:none;font-family:inherit;}

/* DATE FILTER */
.date-filter{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--card);border:1px solid var(--cb);border-radius:8px;padding:8px 14px;flex-wrap:wrap;}
.date-filter label{font-size:11px;color:var(--tm);}
.date-filter input[type=date]{background:var(--bt);border:1px solid var(--cb);border-radius:5px;color:var(--text);font-size:11px;padding:4px 8px;outline:none;font-family:inherit;}
.date-filter input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
.btn-filter{background:var(--hb);color:#fff;border:none;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:500;}
.filter-info{font-size:11px;color:var(--td);margin-left:auto;}

/* DEMO BANNER */
.demo-banner{background:#0a1e0a;border:1px solid #1a4a1a;border-radius:8px;padding:8px 14px;font-size:12px;color:#5ab878;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* MISC */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.4s;}
.loader.hidden{opacity:0;pointer-events:none;}
.spinner{width:32px;height:32px;border:3px solid var(--cb);border-top-color:var(--hb);border-radius:50%;animation:spin 0.8s linear infinite;}
.ltext{margin-top:12px;font-size:12px;color:var(--tm);}
@keyframes spin{to{transform:rotate(360deg);}}
.error-bar{background:#1e0008;border:1px solid var(--hr);border-radius:6px;padding:8px 12px;font-size:12px;color:#e87a8a;margin-bottom:12px;display:none;}

@media(max-width:900px){.dept-grid{grid-template-columns:repeat(2,1fr);}.kpi-row{grid-template-columns:repeat(2,1fr);}.emp-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.dept-grid,.mid-grid,.emp-grid{grid-template-columns:1fr;}.main-wrap,.detail-wrap{padding:14px;}}
</style>
</head>
<body>

<div class="loader" id="loader"><div class="spinner"></div><div class="ltext" id="loader-text" data-de="Wird geladen…" data-en="Loading…">Wird geladen…</div></div>

    <span id="last-update" style="font-size:11px;color:var(--td)"></span>

    <button class="btn-lang" id="lang-de" onclick="setLang('de')" style="background:var(--hb);color:#fff;border-color:var(--hb)">DE</button>

<!-- MAIN PAGE -->

</div>

      <div class="detail-title" id="detail-title">IT Support</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
var CLIENT_ID='62e2a3d5-c767-4071-918d-e681400f82a1';
var TENANT_ID='eb63a598-5c86-4c50-9efa-8e8831a62ba2';
var SITE='https://hasytecag.sharepoint.com/sites/HITS';
var LIST_ID='42919689-29ab-4834-8034-70ac167a396d';
var SCOPES=['https://hasytecag.sharepoint.com/AllSites.Read'];
var lang='de';
var allTickets=[];
var schulungen=parseInt(localStorage.getItem('hits_sch')||'18');
var patchPct=parseInt(localStorage.getItem('hits_pc')||'97');

// ── TRANSLATIONS ─────────────────────────────────────────────────────────────
var T={
  de:{
    frt:'First Response Time',rt:'Resolution Time',pc:'Patch Compliance',sch:'Schulungen',
    tickets_status:'Tickets nach Status',tickets_prio:'Tickets nach Priorität',
    kpi_weighted:'KPI-Bewertung (gewichtet)',overall:'Overall Objective Achievement',
    goal:'Ziel',employees:'Mitarbeiter',
    new:'New',in_progress:'In Progress',waiting:'Waiting',resolved:'Resolved',
    critical:'Critical',high:'High',medium:'Medium',low:'Low',
    manual:'Manuell',training:'Schulungen abgeschlossen',
    from:'Von',to:'Bis',apply:'Anwenden',all:'Alle',
    updated:'Aktualisiert',demo_note:'Demo-Daten — Echte Integration auf Anfrage verfügbar',
    tasks_completed:'Aufgaben erledigt',code_quality:'Code-Qualität',sprint:'Sprint-Abschluss',
    on_time:'Pünktlichkeit',customer_sat:'Kundenzufriedenheit',delivery:'Liefertreue',
    accuracy:'Genauigkeit',response:'Reaktionszeit',productivity:'Produktivität',
    compliance:'Compliance',invoices:'Rechnungen pünktlich',weight:'Gewicht'
  },
  en:{
    frt:'First Response Time',rt:'Resolution Time',pc:'Patch Compliance',sch:'Training',
    tickets_status:'Tickets by Status',tickets_prio:'Tickets by Priority',
    kpi_weighted:'KPI Score (weighted)',overall:'Overall Objective Achievement',
    goal:'Target',employees:'Employees',
    new:'New',in_progress:'In Progress',waiting:'Waiting',resolved:'Resolved',
    critical:'Critical',high:'High',medium:'Medium',low:'Low',
    manual:'Manual',training:'Training completed',
    from:'From',to:'To',apply:'Apply',all:'All',
    updated:'Updated',demo_note:'Demo data — Real integration available on request',
    tasks_completed:'Tasks completed',code_quality:'Code quality',sprint:'Sprint completion',
    on_time:'On time',customer_sat:'Customer satisfaction',delivery:'On-time delivery',
    accuracy:'Accuracy',response:'Response time',productivity:'Productivity',
    compliance:'Compliance',invoices:'Invoices on time',weight:'Weight'
  }
};
function t(k){return(T[lang]&&T[lang][k])||k;}
function setLang(l){
  lang=l;
  document.getElementById('lang-de').style.background=l==='de'?'var(--hb)':'var(--card)';
  document.getElementById('lang-de').style.color=l==='de'?'#fff':'var(--tm)';
  document.getElementById('lang-de').style.borderColor=l==='de'?'var(--hb)':'var(--cb)';
  document.getElementById('lang-en').style.background=l==='en'?'var(--hb)':'var(--card)';
  document.getElementById('lang-en').style.color=l==='en'?'#fff':'var(--tm)';
  document.getElementById('lang-en').style.borderColor=l==='en'?'var(--hb)':'var(--cb)';
  document.querySelectorAll('[data-'+l+']').forEach(function(el){
    el.textContent=el.getAttribute('data-'+l);
  });
  renderMainPage();
}

// ── DEPARTMENTS DATA ──────────────────────────────────────────────────────────
var DEPTS=[
  {id:'it',    icon:'🖥',  live:true,  employees:['Ravil Gottschalk','Robert Temme','Maria Koukoutsidi','Finn Fitschen','Andreas Ioannidis','Corinna Held','Torben Lamp']},
  {id:'rnd',   icon:'🔬', live:false, employees:['Stefan Krause','Jana Müller','Dmitri Volkov','Sarah Chen','Marco Bianchi']},
  {id:'prod',  icon:'⚙️', live:false, employees:['Hans Weber','Klaus Fischer','Petra Schmidt','Olga Petrov','Timo Braun']},
  {id:'after', icon:'🔧', live:false, employees:['Elena Novak','Markus Lange','Yuki Tanaka','Lars Andersen','Sofia Rossi']},
  {id:'pre',   icon:'📊', live:false, employees:['James Wilson','Isabelle Dupont','Carlos Rivera','Nadia Hassan','Tom Schulz']},
  {id:'log',   icon:'📦', live:false, employees:['Pavel Novak','Anna Berger','Mohammed Al-Farsi','Lisa Park','René Dubois']},
  {id:'svc',   icon:'🛠', live:false, employees:['Michael Koch','Fatima Benali','Pieter van Dam','Hana Kovac','Oliver Mayer']},
  {id:'acc',   icon:'💼', live:false, employees:['Christine Wolf','Andrei Popescu','Yuki Sato','Frank Herrmann','Marta Kowalski']}
];

var DEPT_NAMES={
  de:{it:'IT Support',rnd:'R&D',prod:'Produktion',after:'Aftersales',pre:'Presales',log:'Logistik',svc:'Service',acc:'Buchhaltung'},
  en:{it:'IT Support',rnd:'R&D',prod:'Production',after:'Aftersales',pre:'Presales',log:'Logistics',svc:'Service',acc:'Accounting'}
};

// Demo scores per dept
var DEMO_SCORES={
  rnd:0.85, prod:0.78, after:0.90, pre:0.88, log:0.72, svc:0.82, acc:0.95
};

// ── MSAL ─────────────────────────────────────────────────────────────────────
var msalInstance=new msal.PublicClientApplication({
  auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,redirectUri:window.location.origin+window.location.pathname},
  cache:{cacheLocation:'sessionStorage'}
});
function signIn(){msalInstance.loginPopup({scopes:SCOPES}).then(function(r){startPortal(r.account);}).catch(function(e){alert(e.message);});}
function signOut(){msalInstance.logoutPopup();}
async function getToken(){
  var a=msalInstance.getAllAccounts();
  if(!a.length)throw new Error('Not logged in');
  try{var r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:a[0]});return r.accessToken;}
  catch(e){var r=await msalInstance.acquireTokenPopup({scopes:SCOPES});return r.accessToken;}
}

msalInstance.initialize().then(function(){
  return msalInstance.handleRedirectPromise();
}).then(function(){
  var a=msalInstance.getAllAccounts();
  if(a.length>0){startPortal(a[0]);}
  else{document.getElementById('loader').classList.add('hidden');document.getElementById('login-screen').style.display='block';}
}).catch(function(e){
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('login-screen').style.display='block';
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function median(arr){
  var f=arr.filter(function(x){return x>0&&x<=2880;}).sort(function(a,b){return a-b;});
  if(!f.length)return null;
  var m=Math.floor(f.length/2);
  return f.length%2?f[m]:(f[m-1]+f[m])/2;
}
function fmtTime(h){
  if(h===null||h===undefined)return'–';
  var m=Math.round(h*60);
  if(m<60)return m+' Min';
  var hh=Math.floor(m/60),mm=m%60;
  return mm>0?(hh+' Std '+mm+' Min'):(hh+' Std');
}
function calcITScore(items){
  var frtMin=median(items.map(function(i){return i.field_13;}).filter(Boolean));
  var rtMin=median(items.map(function(i){return i.field_14;}).filter(Boolean));
  var frtH=frtMin!=null?frtMin/60:null;
  var rtH=rtMin!=null?rtMin/60:null;
  var frtOk=frtH!=null&&frtH<=8;
  var rtOk=rtH!=null&&rtH<=24;
  var pcOk=patchPct>=95;
  var trOk=schulungen>=18;
  return{frtH:frtH,rtH:rtH,frtOk:frtOk,rtOk:rtOk,pcOk:pcOk,trOk:trOk,
    score:(frtOk?0.2:0)+(rtOk?0.3:0)+(pcOk?0.3:0)+(trOk?0.2:0)};
}
function scoreClass(s){return s>=0.9?'ok':s>=0.7?'warn':'bad';}
function scoreCardClass(s){return s>=0.9?'score-ok':s>=0.7?'score-warn':'score-bad';}

    html+='<div class="emp-score"><span class="emp-score-lbl">Score</span><span class="emp-score-val '+empSc+'">'+empScore.replace('.',',')+'</span></div>';
    html+='</div>';
  });
  html+='</div></div>';

  document.getElementById('detail-content').innerHTML=html;
}
</script>
</body>
</html>
